<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Q4 Drill 1</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

  body{
    
  background-color: rgb(148, 112, 183);

}
    .container{

      justify-content: center;
      background-color: rgb(172, 147, 197);
      margin-top: 50px;
      height: 170px;
    }

    .btn{
      color: rgb(208, 187, 230);
      background-color :rgb(158, 93, 168);
      margin-top: 15px;
    }

    input{
      margin-top: 20px;
    }

  </style>
</head>
<body>


<div class="container"> 
  <h1>Electricity Consumption Classifier<h1>

  <input type="text" id="kWh" class="form-control" placeholder="input kilowatt per hour :">
  <button class="btn" onclick="classify()">Classify</button>
  </div>
    
  <script>

    function classify(){

    var kWh = document.getElementById("kWh").value;

      if(isNaN(kWh) || kWh < 0 ){
            alert("Please input a valid number.");
  }
      else if (kWh < 101){
          alert("Lifeline Consumer : Discounted Electricity Rates.");
  }
      else if(kWh < 201){
        alert("Low Consumption : Normal Residential Rate");
  }
      else if (kWh < 301){
          alert("Average Consumption : Typical Electricity Usage");
  }
      else if(kWh < 501){
          alert("High Consumption : Higher Electricity Usage");
  }
      else {
          alert("Very High Consumption : Heavy Electricity Users");
  }
  
}

  </script>

</body>
